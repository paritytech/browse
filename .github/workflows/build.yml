name: Build

on:
  workflow_call:
  push:
    branches: [main]
    paths: ['app/**']
  pull_request:
    branches: [main]
    paths: ['app/**']

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The daily snapshot job stashes the latest manifest CID here. The prefix
      # match picks up its newest run. Absent on the first ever build.
      - name: Restore snapshot CID
        uses: actions/cache/restore@v4
        with:
          path: .snapshot-cid
          key: domains-snapshot-cid
          restore-keys: |
            domains-snapshot-cid-

      - name: Read snapshot CID
        id: snapshot-cid
        working-directory: ${{ github.workspace }}
        run: |
          if [ -f .snapshot-cid/cid ]; then
            echo "cid=$(cat .snapshot-cid/cid)" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache build output
        id: cache
        uses: actions/cache@v4
        with:
          path: app/dist
          key: build-${{ hashFiles('app/src/**', 'app/index.html', 'app/widget.html', 'app/package.json', 'app/vite.config.ts', 'app/tsconfig.json', 'bun.lock', 'app/.papi/**') }}-${{ steps.snapshot-cid.outputs.cid }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Build
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          APP_DOMAINS_SNAPSHOT_CID: ${{ steps.snapshot-cid.outputs.cid }}
        run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: app/dist/
          retention-days: 7
