name: Labeler
on:
  pull_request_target:

jobs:
  labeler:
    name: Add Labels
    permissions:
      contents: read
      pull-requests: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          configuration-path: '.github/labeler.yml'